name: trade_estimate_ai
description: "AI-powered professional estimates for tradespeople"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.3
  share_plus: ^12.0.1
  in_app_purchase: ^3.2.0
  http: ^1.2.1
  flutter_secure_storage: ^10.0.0
  intl: ^0.20.2
  uuid: ^4.4.0
  lottie: ^3.1.2
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
